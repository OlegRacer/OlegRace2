<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Speedometer in PiP</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            background-color: #1c1c1e;
            color: #ffffff;
            padding: 40px 20px;
        }
        button {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }
        button:disabled {
            background-color: #3a3a3c;
            color: #aeaeae;
            cursor: not-allowed;
        }
        #status {
            margin-top: 20px;
            color: #ecc94b;
        }
        /* Ховаємо відео та канвас з екрана, вони потрібні лише в пам'яті */
        video, canvas {
            display: none;
        }
    </style>
</head>
<body>

    <h1>GPS у Picture-in-Picture</h1>
    <p>Тест швидкості для Safari</p>
    
    <button id="pipBtn" disabled>Запустити PiP</button>
    <div id="status">Очікування дозволу на геолокацію...</div>

    <canvas id="canvas" width="300" height="200"></canvas>
    <video id="video" autoplay playsinline muted></video>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const pipBtn = document.getElementById('pipBtn');
        const statusDiv = document.getElementById('status');

        let currentSpeed = 0;

        // 1. Функція малювання швидкості на Canvas
        function drawSpeed() {
            // Фон
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Значення швидкості
            ctx.fillStyle = '#34c759'; // Зелений колір
            ctx.font = 'bold 70px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(currentSpeed, canvas.width / 2, canvas.height / 2 - 10);

            // Підпис км/год
            ctx.fillStyle = '#aeaeae';
            ctx.font = '20px -apple-system, sans-serif';
            ctx.fillText('км/год', canvas.width / 2, canvas.height / 2 + 50);

            // Запускаємо наступний кадр анімації
            requestAnimationFrame(drawSpeed);
        }

        // 2. Запуск стріму з Canvas у Video
        function initStream() {
            drawSpeed();
            // Захоплюємо потік з канвасу (30 кадрів/сек)
            const stream = canvas.captureStream(30);
            video.srcObject = stream;
            
            // Safari вимагає, щоб кнопка активувалася після взаємодії користувача
            pipBtn.removeAttribute('disabled');
            statusDiv.innerText = "Геолокація активна. Можна запускати PiP!";
        }

        // 3. Відстеження GPS
        if ('geolocation' in navigator) {
            navigator.geolocation.watchPosition(
                (position) => {
                    // Швидкість приходить в м/с, переводимо в км/год
                    if (position.coords.speed !== null && position.coords.speed !== undefined) {
                        const speedKmh = position.coords.speed * 3.6;
                        currentSpeed = Math.round(speedKmh);
                    } else {
                        currentSpeed = 0; // Якщо пристрій стоїть або немає сигналу
                    }
                    
                    // Якщо стрім ще не ініціалізовано — запускаємо
                    if (pipBtn.hasAttribute('disabled')) {
                        initStream();
                    }
                },
                (error) => {
                    statusDiv.style.color = '#ff453a';
                    statusDiv.innerText = `Помилка GPS: ${error.message}. Перевірте дозволи та HTTPS.`;
                },
                {
                    enableHighAccuracy: true, // Вмикаємо максимальну точність GPS
                    maximumAge: 0,
                    timeout: 5000
                }
            );
        } else {
            statusDiv.innerText = "Геолокація не підтримується цим браузером.";
        }

        // 4. Логіка кнопки Picture-in-Picture (тригер від юзера)
        pipBtn.addEventListener('click', async () => {
            try {
                // Перевіряємо підтримку Web API PiP (Safari на macOS/iOS 14+)
                if (document.pictureInPictureEnabled) {
                    if (document.pictureInPictureElement) {
                        await document.exitPictureInPicture();
                    } else {
                        await video.requestPictureInPicture();
                    }
                } 
                // Старий синтаксис Apple для деяких версій Safari
                else if (video.webkitSupportsPresentationMode && typeof video.webkitSetPresentationMode === "function") {
                    video.webkitSetPresentationMode(video.webkitPresentationMode === "picture-in-picture" ? "inline" : "picture-in-picture");
                } else {
                    alert("Цей пристрій або браузер не підтримує PiP для цього відео.");
                }
            } catch (err) {
                console.error("Помилка PiP:", err);
                alert("Не вдалося відкрити вікно PiP. Переконайтеся, що ви натиснули кнопку вручну.");
            }
        });
    </script>
</body>
</html>

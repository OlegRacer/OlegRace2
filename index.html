<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Speedometer (Hidden Video)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            background-color: #1c1c1e;
            color: #ffffff;
            padding: 40px 20px;
            margin: 0;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        button {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s, transform 0.1s;
            margin-top: 20px;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            background-color: #3a3a3c;
            color: #aeaeae;
            cursor: not-allowed;
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #ecc94b;
            padding: 0 20px;
        }
        
        /* КАНВАС ПОВНІСТЮ СХОВАНИЙ */
        canvas {
            display: none;
        }

        /* ВІДЕО СХОВАНО В 1 ПІКСЕЛЬ ЗА ЗАМОВЧУВАННЯМ */
        #video-container {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 1px;
            height: 1px;
            overflow: hidden;
            opacity: 0.01;
            z-index: -1;
            pointer-events: none;
            transition: all 0.2s ease;
        }
        video {
            width: 100%;
            height: 100%;
            background: #000;
        }

        /* Якщо автозапуск заблоковано, цей клас тимчасово покаже відео */
        #video-container.fallback-visible {
            position: relative;
            width: 280px;
            height: 180px;
            opacity: 1;
            z-index: 10;
            pointer-events: auto;
            margin: 20px auto 0 auto;
        }
    </style>
</head>
<body>

    <h1>GPS у Picture-in-Picture</h1>
    <div id="status">Очікування сигналу GPS та дозволу...</div>
    
    <button id="pipBtn" disabled>Запустити PiP</button>

    <div id="video-container">
        <video id="video" playsinline muted controls></video>
    </div>

    <canvas id="canvas" width="300" height="200"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const container = document.getElementById('video-container');
        const ctx = canvas.getContext('2d');
        const pipBtn = document.getElementById('pipBtn');
        const statusDiv = document.getElementById('status');

        let currentSpeed = 0;
        let streamInitialized = false;

        // Енергоефективне малювання (1 кадр/сек)
        function drawSpeedFrame() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#34c759'; 
            ctx.font = 'bold 70px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(currentSpeed, canvas.width / 2, canvas.height / 2 - 10);

            ctx.fillStyle = '#aeaeae';
            ctx.font = '20px -apple-system, sans-serif';
            ctx.fillText('км/год', canvas.width / 2, canvas.height / 2 + 50);
        }

        function initStream() {
            drawSpeedFrame();
            
            // Економія батареї: лише 1 кадр на секунду
            const stream = canvas.captureStream(1); 
            video.srcObject = stream;
            
            streamInitialized = true;
            pipBtn.removeAttribute('disabled');
            statusDiv.innerText = "Сигнал є. Натисніть кнопку для запуску!";
            
            setInterval(drawSpeedFrame, 1000);
        }

        // Запуск GPS
        if ('geolocation' in navigator) {
            navigator.geolocation.watchPosition(
                (position) => {
                    if (position.coords.speed !== null && position.coords.speed !== undefined) {
                        currentSpeed = Math.round(position.coords.speed * 3.6);
                    } else {
                        currentSpeed = 0; 
                    }
                    
                    if (!streamInitialized) {
                        initStream();
                    } else {
                        drawSpeedFrame();
                    }
                },
                (error) => { 
                    statusDiv.style.color = '#ff453a';
                    statusDiv.innerText = `Помилка GPS: ${error.message}`; 
                },
                { enableHighAccuracy: true, maximumAge: 1000, timeout: 5000 }
            );
        } else {
            statusDiv.innerText = "Геолокація не підтримується.";
        }

        // Логіка кнопки
        pipBtn.addEventListener('click', async () => {
            try {
                // Обов'язково запускаємо плеєр
                await video.play();

                // Пробуємо піти в PiP автоматично
                if (video.webkitSetPresentationMode) {
                    video.webkitSetPresentationMode("picture-in-picture");
                } else if (document.pictureInPictureEnabled) {
                    await video.requestPictureInPicture();
                } else {
                    throw new Error("Програмний запуск не підтримується оболонкою");
                }
            } catch (err) {
                console.log("Автозапуск PiP заблоковано, вмикаємо ручний режим:", err);
                
                // ПЛАН Б: Тимчасово показуємо відео, щоб користувач натиснув кнопку на ньому
                container.classList.add('fallback-visible');
                statusDiv.innerText = "Bluefy вимагає ручного підтвердження. Натисніть іконку PiP на відео нижче!";
                
                // Слідкуємо, коли користувач все ж таки увімкне PiP вручну
                const checkPiPMode = () => {
                    if (video.webkitPresentationMode === "picture-in-picture" || document.pictureInPictureElement) {
                        // Як тільки увійшли в PiP — знову ховаємо оригінальне відео на сторінці
                        container.classList.remove('fallback-visible');
                        statusDiv.innerText = "Працює у фоновому вікні!";
                        video.removeEventListener('webkitpresentationmodechanged', checkPiPMode);
                        video.removeEventListener('enterpictureinpicture', checkPiPMode);
                    }
                };
                
                video.addEventListener('webkitpresentationmodechanged', checkPiPMode);
                video.addEventListener('enterpictureinpicture', checkPiPMode);
            }
        });
    </script>
</body>
</html>

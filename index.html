<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>aRacer Dash + PiP</title>
<style>
:root{\n  --bg:#000;--panel:#0d0d0f;--line:rgba(255,255,255,0.07);\n  --text:#f2f2f0;--muted:#666;\n  --cyan:#37e0e6;--amber:#ffb74d;--red:#ff4d4d;\n  --green:#4ade80;--blue:#3b82f6;--yellow:#ffd23f;\n  --th:48px;\n}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;\n  user-select:none;-webkit-user-select:none;touch-action:manipulation;}
html,body{margin:0;padding:0;height:100%;width:100%;\n  background:#000;color:var(--text);\n  font-family:'Rajdhani','Segoe UI',sans-serif;\n  overflow:hidden;-webkit-font-smoothing:antialiased;}

/* TOPBAR */
.tb{position:fixed;top:0;left:0;right:0;z-index:50;\n  display:flex;align-items:center;gap:5px;\n  padding:max(5px,env(safe-area-inset-top)) 10px 5px 10px;\n  background:rgba(13,13,15,0.85);backdrop-filter:blur(10px);\n  border-bottom:1px solid var(--line);height:var(--th);}

/* Елементи для PiP (ховаємо з екрану, бо вони потрібні лише для відеотрансляції) */
#pip-video-container {
  position:absolute; top:-9999px; left:-9999px; width:300px; height:200px; pointer-events:none;
}
#pip-canvas { display: none; }

/* Кнопка PiP в топбарі */
.pip-btn {
  background: var(--panel); border: 1px solid var(--line); color: var(--text);
  padding: 6px 12px; border-radius: 8px; font-weight: bold; cursor: pointer;
  display: flex; align-items: center; gap: 5px; font-size: 14px;
}
.pip-btn:active { background: var(--line); }
</style>
</head>
<body>

  <div class="tb">
    <div style="font-weight:bold; font-size:18px; margin-right:auto;">aRacer Dash</div>
    <button class="pip-btn" id="globalPipBtn">📺 PiP Режим</button>
  </div>

  <div id="pip-video-container">
    <video id="pip-video" playsinline muted></video>
  </div>
  <canvas id="pip-canvas" width="300" height="200"></canvas>

  <script>
    // --- Твоя основна логіка aRacer Dash (Grid, Lay, Дані) ---
    let currentSpeed = 0;
    let currentTemp = 0;
    let streamInitialized = false;

    const pipVideo = document.getElementById('pip-video');
    const pipCanvas = document.getElementById('pip-canvas');
    const pipCtx = pipCanvas.getContext('2d');
    const globalPipBtn = document.getElementById('globalPipBtn');

    // Функція малювання кастомного кадру для PiP (Швидкість + Температура)
    function drawPipFrame() {
      // Фон
      pipCtx.fillStyle = '#0d0d0f';
      pipCtx.fillRect(0, 0, pipCanvas.width, pipCanvas.height);

      // Роздільна лінія (опціонально)
      pipCtx.strokeStyle = 'rgba(255,255,255,0.07)';
      pipCtx.lineWidth = 2;
      pipCtx.beginPath();
      pipCtx.moveTo(pipCanvas.width / 2, 20);
      pipCtx.lineTo(pipCanvas.width / 2, pipCanvas.height - 20);
      pipCtx.stroke();

      // Ліва частина: ШВИДКІСТЬ
      pipCtx.fillStyle = '#37e0e6'; // Кліп/Ціан колір
      pipCtx.font = 'bold 55px -apple-system, sans-serif';
      pipCtx.textAlign = 'center';
      pipCtx.textBaseline = 'middle';
      pipCtx.fillText(currentSpeed, pipCanvas.width / 4, pipCanvas.height / 2 - 10);

      pipCtx.fillStyle = '#666';
      pipCtx.font = '14px -apple-system, sans-serif';
      pipCtx.fillText('км/год', pipCanvas.width / 4, pipCanvas.height / 2 + 35);

      // Права частина: ТЕМПЕРАТУРА
      pipCtx.fillStyle = '#ff4d4d'; // Червоний колір для температури
      pipCtx.font = 'bold 55px -apple-system, sans-serif';
      pipCtx.fillText(currentTemp, (pipCanvas.width / 4) * 3, pipCanvas.height / 2 - 10);

      pipCtx.fillStyle = '#666';
      pipCtx.font = '14px -apple-system, sans-serif';
      pipCtx.fillText('°C Мотор', (pipCanvas.width / 4) * 3, pipCanvas.height / 2 + 35);
    }

    // Ініціалізація медіапотоку з Canvas у Video
    function initPipStream() {
      if (streamInitialized) return;
      drawPipFrame();
      
      const stream = pipCanvas.captureStream(30); // 30 FPS
      pipVideo.srcObject = stream;
      streamInitialized = true;

      // Оновлення кадру кожну секунду (економія батареї) або при зміні даних
      setInterval(drawPipFrame, 1000);
    }

    // Логіка отримання GPS швидкості
    if ('geolocation' in navigator) {
      navigator.geolocation.watchPosition(
        (position) => {
          if (position.coords.speed !== null && position.coords.speed !== undefined) {
            currentSpeed = Math.round(position.coords.speed * 3.6);
          } else {
            currentSpeed = 0;
          }
          if (!streamInitialized) initPipStream();
          drawPipFrame();
        },
        (error) => { console.log(`GPS Error: ${error.message}`); },
        { enableHighAccuracy: true, maximumAge: 1000, timeout: 5000 }
      );
    }

    // Симуляція або підключення даних температури з твого aRacer (прив'яжи до своєї змінної)
    // Наприклад, якщо у тебе є циклічне оновлення даних:
    // currentTemp = e.data.engineTemp; drawPipFrame();

    // Обробник натискання кнопки запуску PiP
    globalPipBtn.addEventListener('click', async () => {
      initPipStream(); // Впевнимось, що потік готовий
      try {
        await pipVideo.play();
        if (pipVideo.webkitSetPresentationMode) {
          pipVideo.webkitSetPresentationMode("picture-in-picture");
        } else if (document.pictureInPictureEnabled) {
          await pipVideo.requestPictureInPicture();
        }
      } catch (err) {
        console.error("Не вдалося запустити PiP вікно:", err);
      }
    });

    // --- Тут продовжується решта твого коду рендерингу плиток (render(), selst(), cpk()) ---
  </script>
</body>
</html>

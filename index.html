<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>aRacer BLE Dash</title>
<style>
  :root{
    --bg:#0a0a0c; --panel:#111114; --line:rgba(255,255,255,0.08);
    --text:#f2f2f0; --muted:#8a8a92;
    --cyan:#37e0e6; --amber:#ffb74d; --red:#ff4d4d;
    --green:#4ade80; --blue:#3b82f6; --yellow:#ffd23f;
    --topbar-h:48px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent;
     user-select:none; -webkit-user-select:none; touch-action:manipulation; }
  html,body{ margin:0;padding:0;height:100%;width:100%;background:var(--bg);
    color:var(--text);font-family:'Rajdhani','Segoe UI',sans-serif;
    overflow:hidden;-webkit-font-smoothing:antialiased; }
  body{ background-image:
    repeating-linear-gradient(135deg,rgba(255,255,255,0.012) 0px,rgba(255,255,255,0.012) 1px,transparent 1px,transparent 6px),
    repeating-linear-gradient(45deg,rgba(255,255,255,0.012) 0px,rgba(255,255,255,0.012) 1px,transparent 1px,transparent 6px); }

  .topbar{ position:fixed;top:0;left:0;right:0;z-index:50;
    display:flex;align-items:center;gap:6px;
    padding:max(6px,env(safe-area-inset-top)) 8px 6px;
    background:rgba(10,10,12,0.9);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line); }
  .pill{ border:1px solid var(--line);border-radius:6px;padding:5px 10px;
    font-size:12px;letter-spacing:0.5px;color:var(--muted);
    background:rgba(255,255,255,0.02);white-space:nowrap;cursor:pointer; }
  .pill.on{ color:#9be8ff;border-color:#2b6f7a;background:rgba(43,170,190,0.08); }
  .pill.err{ color:#ff8080;border-color:rgba(255,77,77,0.3);background:rgba(255,77,77,0.06); }
  .pill.connected{ color:#4ade80;border-color:rgba(74,222,128,0.4);background:rgba(74,222,128,0.08); }
  .pill.connecting{ color:var(--amber);border-color:rgba(255,183,77,0.3);background:rgba(255,183,77,0.06); }
  #editBtn{ margin-left:auto;flex-shrink:0;border:1px solid var(--line);border-radius:6px;
    padding:5px 12px;font-size:12px;color:var(--muted);
    background:rgba(255,255,255,0.02);cursor:pointer; }
  #editBtn.active{ color:#0a0a0c;background:var(--cyan);border-color:var(--cyan);font-weight:700; }

  /* GRID */
  #grid{ position:fixed;inset:0;
    padding-top:calc(env(safe-area-inset-top) + var(--topbar-h));
    padding-bottom:env(safe-area-inset-bottom,8px);
    overflow:hidden; }
  #gridInner{ display:grid;grid-template-columns:repeat(4,1fr);
    gap:6px;padding:6px;height:100%;grid-template-rows:repeat(3,1fr); }

  @media (orientation:landscape){
    :root{ --topbar-h:38px; }
    #gridInner{ grid-template-columns:repeat(6,1fr);gap:5px;padding:5px; }
    .topbar{ padding-top:max(4px,env(safe-area-inset-top));padding-bottom:4px; }
    .pill{ font-size:11px;padding:4px 8px; }
    #editBtn{ font-size:11px;padding:4px 10px; }
    /* In landscape: size-1x1 becomes 2x1 automatically via JS class */
    .tile.landscape-wide{ grid-column:span 2; }
  }

  /* TILES */
  .tile{ position:relative;border-radius:12px;background:var(--panel);
    border:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:6px;overflow:hidden;-webkit-touch-callout:none; }
  .tile.size-1x1{ grid-column:span 1;grid-row:span 1; }
  .tile.size-2x2{ grid-column:span 2;grid-row:span 2; }
  .tile.size-2x1{ grid-column:span 2;grid-row:span 1; }
  .tile.editing{ animation:jiggle 0.4s ease-in-out infinite; }
  @keyframes jiggle{0%,100%{transform:rotate(0deg);}25%{transform:rotate(-0.7deg);}75%{transform:rotate(0.7deg);}}
  .tile.drag-selected{ animation:none!important;box-shadow:0 0 0 2px var(--cyan),0 0 20px rgba(55,224,230,0.3)!important;transform:scale(1.03);z-index:20; }
  .tile.drag-over{ box-shadow:inset 0 0 0 2px var(--amber);background:rgba(255,183,77,0.05); }
  .remove-badge{ position:absolute;top:5px;right:5px;width:20px;height:20px;
    border-radius:50%;background:#ff4d4d;color:#fff;
    align-items:center;justify-content:center;font-size:13px;font-weight:700;
    z-index:5;box-shadow:0 2px 6px rgba(0,0,0,0.5);display:none; }
  .tile.editing .remove-badge{ display:flex; }
  .add-tile{ border-style:dashed;border-color:rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.015);color:var(--muted);font-size:28px;
    cursor:pointer;animation:none!important; }

  .tile-label{ font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--param-color,var(--muted));margin-bottom:1px;text-align:center;
    white-space:normal;word-break:break-word;line-height:1.2;max-width:100%;font-weight:700; }
  .tile-value{ font-family:'JetBrains Mono','Courier New',monospace;font-weight:700;
    line-height:1;color:#fff;font-size:clamp(16px,6vw,32px);letter-spacing:1px; }
  .tile-unit{ font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:1px; }
  .tile-underline{ width:55%;height:1px;background:var(--param-color,var(--cyan));opacity:0.5;margin:3px 0; }
  .size-2x2 .tile-value{ font-size:clamp(28px,8vw,54px); }
  @media (orientation:landscape){
    .tile-value{ font-size:clamp(14px,4.5vw,28px); }
    .size-2x2 .tile-value,.tile.landscape-wide .tile-value{ font-size:clamp(20px,5vw,36px); }
  }

  .gauge-wrap{ position:relative;width:100%;height:100%;min-height:60px;
    display:flex;align-items:center;justify-content:center; }
  .gauge-svg{ position:absolute;inset:0;width:100%;height:100%; }
  .gauge-center{ display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2; }
  .gauge-bg{ fill:none;stroke:rgba(255,255,255,0.06);stroke-width:6; }
  .gauge-fg{ fill:none;stroke:var(--param-color,var(--cyan));stroke-width:6;stroke-linecap:round; }

  /* MODALS */
  .modal-backdrop{ position:fixed;inset:0;background:rgba(0,0,0,0.75);
    backdrop-filter:blur(5px);z-index:100;display:flex;align-items:flex-end;
    justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s ease; }
  .modal-backdrop.show{ opacity:1;pointer-events:auto; }
  .modal-sheet{ width:100%;max-width:640px;background:#15151a;border:1px solid var(--line);
    border-radius:18px 18px 0 0;max-height:88vh;display:flex;flex-direction:column;
    transform:translateY(100%);transition:transform .25s cubic-bezier(.2,.9,.3,1);
    padding-bottom:env(safe-area-inset-bottom); }
  .modal-backdrop.show .modal-sheet{ transform:translateY(0); }
  .modal-header{ padding:14px 16px 10px;display:flex;align-items:center;
    justify-content:space-between;border-bottom:1px solid var(--line);flex-shrink:0; }
  .modal-header h3{ margin:0;font-size:15px;letter-spacing:1px;font-weight:600; }
  .modal-close{ border:none;background:rgba(255,255,255,0.06);color:var(--text);
    width:28px;height:28px;border-radius:50%;font-size:15px;cursor:pointer; }
  .modal-body{ overflow-y:auto;padding:8px 12px;flex:1; }
  .group-title{ font-size:10px;letter-spacing:2px;color:var(--muted);
    text-transform:uppercase;padding:8px 6px 4px; }
  .param-list{ display:flex;flex-direction:column;gap:3px; }
  .param-item{ display:flex;align-items:center;justify-content:space-between;
    padding:10px 12px;border-radius:10px;background:rgba(255,255,255,0.03);
    border:1px solid transparent;font-size:14px;cursor:pointer; }
  .param-item.selected{ border-color:var(--cyan);background:rgba(55,224,230,0.08); }
  .param-item .pname{ font-weight:600; }
  .param-item .pcode{ color:var(--muted);font-size:11px;font-family:monospace;margin-left:6px; }
  .param-item .check{ width:20px;height:20px;border-radius:50%;border:1.5px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;flex-shrink:0; }
  .param-item.selected .check{ border-color:var(--cyan);background:var(--cyan);color:#0a0a0c; }
  .style-row,.size-row{ display:flex;gap:6px;padding:8px 6px;flex-wrap:wrap; }
  .style-btn{ flex:1;min-width:60px;border:1px solid var(--line);border-radius:10px;
    padding:9px 6px;text-align:center;font-size:12px;
    background:rgba(255,255,255,0.03);color:var(--muted);cursor:pointer; }
  .style-btn.selected{ border-color:var(--cyan);color:#fff;background:rgba(55,224,230,0.08); }
  .action-btn{ width:100%;padding:11px;border-radius:10px;border:none;
    font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px; }
  .action-btn.primary{ background:rgba(55,224,230,0.12);border:1px solid rgba(55,224,230,0.4);color:#9be8ff; }
  .action-btn.danger{ background:rgba(255,77,77,0.08);border:1px solid rgba(255,77,77,0.3);color:#ff8080; }
  .tab-bar{ display:flex;border-bottom:1px solid var(--line);flex-shrink:0; }
  .tab{ flex:1;padding:10px;text-align:center;font-size:12px;font-weight:600;
    letter-spacing:1px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent; }
  .tab.active{ color:var(--cyan);border-bottom-color:var(--cyan); }

  /* PiP edit list */
  .pip-item-row{ display:flex;align-items:center;gap:8px;padding:8px 6px;border-bottom:1px solid var(--line); }
  .pip-item-color{ width:8px;height:8px;border-radius:50%;flex-shrink:0; }
  .pip-item-name{ flex:1;font-size:13px;font-weight:600; }
  .pip-item-size{ font-size:11px;color:var(--muted); }
  .pip-size-btn{ border:1px solid var(--line);border-radius:5px;padding:3px 7px;
    font-size:11px;color:var(--muted);background:rgba(255,255,255,0.03);cursor:pointer;margin-left:2px; }
  .pip-size-btn.active{ border-color:var(--cyan);color:var(--cyan);background:rgba(55,224,230,0.08); }
  .pip-rm-btn{ border:none;background:rgba(255,77,77,0.1);color:#ff8080;
    border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer; }

  ::-webkit-scrollbar{ width:3px;height:3px; }
  ::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.15);border-radius:2px; }
  .hint-toast{ position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
    background:rgba(20,20,24,0.95);border:1px solid var(--line);
    padding:7px 16px;border-radius:20px;font-size:12px;color:var(--muted);
    z-index:80;opacity:0;transition:opacity .3s ease;pointer-events:none;white-space:nowrap; }
  .hint-toast.show{ opacity:1; }
  #bleLog{ position:fixed;bottom:54px;left:8px;right:8px;background:rgba(0,0,0,0.9);
    border:1px solid var(--line);border-radius:10px;padding:7px 10px;
    font-family:monospace;font-size:11px;color:#4ade80;z-index:70;
    max-height:90px;overflow-y:auto;display:none; }
  #bleLog.show{ display:block; }
</style>
</head>
<body>

<div class="topbar">
  <button id="connectBtn" class="pill">🔵 Connect</button>
  <div id="bleStatus" class="pill">bLink3</div>
  <button id="pipBtn" class="pill">PiP</button>
  <button id="editBtn">Налаштувати</button>
</div>
<div id="grid"><div id="gridInner"></div></div>
<div id="bleLog"></div>
<div class="hint-toast" id="hintToast"></div>

<canvas id="pipCanvas" width="480" height="240" style="display:none;"></canvas>
<video id="pipVideo" style="position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;" muted playsinline></video>

<!-- EDIT MODAL -->
<div class="modal-backdrop" id="editModal">
  <div class="modal-sheet">
    <div class="modal-header">
      <h3>Налаштувати</h3>
      <button class="modal-close" id="editModalClose">✕</button>
    </div>
    <div class="tab-bar">
      <div class="tab active" id="tabMain" onclick="switchTab('main')">ЕКРАН</div>
      <div class="tab" id="tabPip" onclick="switchTab('pip')">PiP</div>
    </div>
    <div class="modal-body" id="editModalBody"></div>
  </div>
</div>

<!-- PARAM PICKER -->
<div class="modal-backdrop" id="pickerModal">
  <div class="modal-sheet">
    <div class="modal-header">
      <h3 id="pickerTitle">Вибрати параметр</h3>
      <button class="modal-close" id="pickerClose">✕</button>
    </div>
    <div class="modal-body" id="pickerBody"></div>
  </div>
</div>

<script>
/* ── PARAMS ── */
const PARAMS = {
  'RPM':      {name:'RPM',        off:26, size:2,scale:1,       bias:0,  unit:'rpm', min:0,  max:9000,color:'#ffd23f',src:'ble'},
  'T_Eng':    {name:'T_Eng',      off:33, size:1,scale:1,       bias:28, unit:'°C',  min:0,  max:130, color:'#3b82f6',src:'ble'},
  'T_Air':    {name:'T_Air',      off:24, size:1,scale:1,       bias:28, unit:'°C',  min:-20,max:80,  color:'#37e0e6',src:'ble'},
  'AFR':      {name:'AFR',        off:20, size:1,scale:10,      bias:0,  unit:'AFR', min:10, max:18,  color:'#ffb74d',src:'ble'},
  'AFR_WBO2': {name:'AFR WBO2',   off:55, size:2,scale:100,     bias:0,  unit:'AFR', min:10, max:18,  color:'#ff9f43',src:'ble'},
  'SA':       {name:'SA',         off:25, size:1,scale:1,       bias:128,unit:'°',   min:-30,max:50,  color:'#ff6b81',src:'ble'},
  'TPS':      {name:'TPS%',       off:34, size:1,scale:2.55,    bias:0,  unit:'%',   min:0,  max:100, color:'#37e0e6',src:'ble'},
  'TPS_indx': {name:'TPS indx',   off:28, size:1,scale:1,       bias:0,  unit:'cnt', min:0,  max:255, color:'#37e0e6',src:'ble'},
  'Volt':     {name:'Volt Batt',  off:29, size:1,scale:10,      bias:0,  unit:'V',   min:10, max:16,  color:'#4ade80',src:'ble'},
  'Fuel_CL':  {name:'Fuel CL',    off:22, size:2,scale:5.12,    bias:512,unit:'%',   min:-25,max:25,  color:'#4ade80',src:'ble'},
  'Cyl1_AP':  {name:'Cyl1 AP',    off:45, size:2,scale:256,     bias:0,  unit:'kPa', min:0,  max:110, color:'#37e0e6',src:'ble'},
  'Veh_Spd':  {name:'Veh Speed',  off:51, size:2,scale:256,     bias:0,  unit:'km/h',min:0,  max:300, color:'#37e0e6',src:'ble'},
  'Gear':     {name:'Gear',       off:130,size:1,scale:1,       bias:0,  unit:'',    min:0,  max:6,   color:'#3b82f6',src:'ble'},
  'EGT':      {name:'EGT',        off:91, size:2,scale:1,       bias:0,  unit:'°C',  min:0,  max:1000,color:'#ff4d4d',src:'ble'},
  'P_Atm':    {name:'Atm Press',  off:44, size:1,scale:1,       bias:0,  unit:'kPa', min:80, max:110, color:'#8a8a92',src:'ble'},
  'FuelPW':   {name:'Fuel PW',    off:35, size:2,scale:289.0625,bias:0,  unit:'ms',  min:0,  max:20,  color:'#ffb74d',src:'ble'},
  'Inj_Rate': {name:'Inj Rate',   off:82, size:1,scale:2.56,    bias:0,  unit:'%',   min:0,  max:100, color:'#ff9f43',src:'ble'},
  'GPS_Phone':{name:'GPS Speed',  off:-1, size:0,scale:1,       bias:0,  unit:'km/h',min:0,  max:300, color:'#37e0e6',src:'gps'},
  'Altitude': {name:'Altitude',   off:-1, size:0,scale:1,       bias:0,  unit:'m',   min:0,  max:3000,color:'#8a8a92',src:'gps'},
};
const PARAM_GROUPS=[
  {title:'Двигун',    codes:['RPM','T_Eng','T_Air','SA','Gear','EGT','P_Atm']},
  {title:'Паливо',    codes:['AFR','AFR_WBO2','Fuel_CL','FuelPW','Inj_Rate']},
  {title:'Дросель',   codes:['TPS','TPS_indx','Cyl1_AP']},
  {title:'Швидкість', codes:['GPS_Phone','Veh_Spd']},
  {title:'Електрика', codes:['Volt']},
  {title:'Телефон',   codes:['GPS_Phone','Altitude']},
];
const liveValues={};
Object.keys(PARAMS).forEach(k=>liveValues[k]='--');

/* ── GPS ── */
let gpsWatchId=null;
function startGPS(){
  if(!navigator.geolocation||gpsWatchId!==null)return;
  gpsWatchId=navigator.geolocation.watchPosition(pos=>{
    liveValues['GPS_Phone']=pos.coords.speed!==null?Math.round(pos.coords.speed*3.6*10)/10:0;
    liveValues['Altitude']=pos.coords.altitude!==null?Math.round(pos.coords.altitude):'--';
    updateDisplay();
  },()=>{liveValues['GPS_Phone']='GPS?';liveValues['Altitude']='GPS?';},{enableHighAccuracy:true,maximumAge:1000});
}
startGPS();

/* ── BLE ── */
let bleDevice=null,bleChar=null,rxBuffer=new Uint8Array(0),bleConnected=false;
const SVC='0000ffe0-0000-1000-8000-00805f9b34fb',CHR='0000ffe1-0000-1000-8000-00805f9b34fb';
function ab(a,b){const c=new Uint8Array(a.length+b.length);c.set(a);c.set(b,a.length);return c;}
function tryParse(buf){
  for(let s=0;s<buf.length-20;s++)
    for(let l=20;l<=Math.min(200,buf.length-s-1);l++){
      let sum=0;for(let i=s;i<s+l;i++)sum+=buf[i];
      if(buf[s+l]===((256-(sum&0xFF))&0xFF))return{payload:buf.slice(s,s+l),consumed:s+l+1};
    }
  return null;
}
function parsePayload(payload){
  logBle('Pkt '+payload.length+'B: '+Array.from(payload.slice(0,8)).map(b=>b.toString(16).padStart(2,'0')).join(' ')+'…');
  Object.entries(PARAMS).forEach(([code,p])=>{
    if(p.src!=='ble'||p.off+p.size>payload.length)return;
    let raw=0;for(let i=0;i<p.size;i++)raw=(raw<<8)|payload[p.off+i];
    liveValues[code]=(p.unit==='rpm'||p.unit==='')?Math.round((raw-p.bias)/p.scale):Math.round((raw-p.bias)/p.scale*10)/10;
  });
  updateDisplay();
}
function onBleData(e){
  rxBuffer=ab(rxBuffer,new Uint8Array(e.target.value.buffer));
  if(rxBuffer.length>1024)rxBuffer=rxBuffer.slice(rxBuffer.length-512);
  const r=tryParse(rxBuffer);
  if(r){parsePayload(r.payload);rxBuffer=rxBuffer.slice(r.consumed);}
}
async function connectBLE(){
  const btn=document.getElementById('connectBtn');
  if(bleConnected){try{bleDevice&&bleDevice.gatt.disconnect();}catch(e){}
    bleConnected=false;btn.textContent='🔵 Connect';btn.className='pill';
    document.getElementById('bleStatus').textContent='bLink3';document.getElementById('bleStatus').className='pill';return;}
  btn.textContent='⏳…';btn.className='pill connecting';
  try{
    bleDevice=await navigator.bluetooth.requestDevice({filters:[{namePrefix:'bLink'}],optionalServices:[SVC]});
    bleDevice.addEventListener('gattserverdisconnected',onBleDisc);
    const srv=await bleDevice.gatt.connect();
    bleChar=await(await srv.getPrimaryService(SVC)).getCharacteristic(CHR);
    bleChar.addEventListener('characteristicvaluechanged',onBleData);
    await bleChar.startNotifications();
    bleConnected=true;btn.textContent='🟢 '+(bleDevice.name||'OK');btn.className='pill connected';
    document.getElementById('bleStatus').textContent='● LIVE';document.getElementById('bleStatus').className='pill on';
    logBle('Connected to '+bleDevice.name);showHint('Підключено до '+bleDevice.name);
  }catch(e){bleConnected=false;btn.textContent='🔵 Connect';btn.className='pill';
    document.getElementById('bleStatus').textContent='Error';document.getElementById('bleStatus').className='pill err';
    logBle('Err: '+e.message);showHint('Помилка: '+e.message);}
}
function onBleDisc(){bleConnected=false;document.getElementById('connectBtn').textContent='🔵 Connect';
  document.getElementById('connectBtn').className='pill';document.getElementById('bleStatus').textContent='Disconnected';
  document.getElementById('bleStatus').className='pill err';}
document.getElementById('connectBtn').addEventListener('click',connectBLE);
let logVisible=false,logTimer;const bleLogEl=document.getElementById('bleLog');
function logBle(m){bleLogEl.innerHTML+=m+'<br>';bleLogEl.scrollTop=bleLogEl.scrollHeight;}
document.getElementById('connectBtn').addEventListener('pointerdown',()=>{logTimer=setTimeout(()=>{logVisible=!logVisible;bleLogEl.classList.toggle('show',logVisible);},800);});
document.getElementById('connectBtn').addEventListener('pointerup',()=>clearTimeout(logTimer));

/* ── STORAGE ── */
function ls_get(k){try{const s=localStorage.getItem(k);return s?JSON.parse(s):null;}catch(e){return null;}}
function ls_set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

/* ── LANDSCAPE DETECTION ── */
function isLandscape(){ return window.innerWidth>window.innerHeight; }

/* ── MAIN LAYOUT ── */
function defaultLayout(){return[
  {id:'t1',param:'T_Eng',    style:'flat',size:'2x2'},
  {id:'t2',param:'GPS_Phone',style:'flat',size:'2x2'},
  {id:'t3',param:'TPS',      style:'flat',size:'2x1'},
  {id:'t4',param:'Inj_Rate', style:'flat',size:'2x1'},
  {id:'t5',param:'Volt',     style:'flat',size:'2x1'},
  {id:'t6',param:'Altitude', style:'flat',size:'1x1'},
  {id:'t7',param:'T_Air',    style:'flat',size:'1x1'},
];}
let layout=ls_get('aracer_layout')||defaultLayout();
let editMode=false,nextId=20,dragSelected=null;
const gridInner=document.getElementById('gridInner');

function render(){
  // update grid rows based on landscape/portrait
  const land=isLandscape();
  gridInner.innerHTML='';

  // In landscape: figure out which 1x1 tiles should become wider
  // Count 1x1 tiles in last row to detect orphans
  layout.forEach((tile,idx)=>{
    const el=renderTile(tile,land);
    gridInner.appendChild(el);
  });
  if(editMode){
    const add=document.createElement('div');
    add.className='tile add-tile size-1x1';add.textContent='+';
    add.addEventListener('click',()=>openPicker(null,'main'));
    gridInner.appendChild(add);
  }
}

function renderTile(tile,land){
  const p=PARAMS[tile.param];
  const el=document.createElement('div');
  let cls=`tile size-${tile.size}`;
  // In landscape: promote 1x1 → 2x1 to fill gaps
  if(land&&tile.size==='1x1') cls+=' landscape-wide';
  if(editMode) cls+=' editing';
  el.className=cls;
  el.dataset.id=tile.id;
  el.style.setProperty('--param-color',p.color);
  const rb=document.createElement('div');rb.className='remove-badge';rb.textContent='✕';
  rb.addEventListener('click',e=>{e.stopPropagation();layout=layout.filter(t=>t.id!==tile.id);ls_set('aracer_layout',layout);render();});
  el.appendChild(rb);
  el.appendChild(tile.style==='gauge'?buildGauge(tile,p):buildFlat(tile,p));
  attachDrag(el,tile);
  return el;
}

function buildFlat(tile,p){
  const w=document.createElement('div');
  w.style.cssText='display:flex;flex-direction:column;align-items:center;width:100%;';
  const lbl=document.createElement('div');lbl.className='tile-label';lbl.textContent=p.name;
  const ul=document.createElement('div');ul.className='tile-underline';
  const val=document.createElement('div');val.className='tile-value';val.dataset.live=tile.param;val.textContent=liveValues[tile.param];
  const unit=document.createElement('div');unit.className='tile-unit';unit.textContent=p.unit;
  w.append(lbl,ul,val);if(p.unit)w.append(unit);return w;
}
function buildGauge(tile,p){
  const wrap=document.createElement('div');wrap.className='gauge-wrap';
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 100 100');svg.classList.add('gauge-svg');
  const r=42,C=2*Math.PI*r;
  const bg=document.createElementNS('http://www.w3.org/2000/svg','circle');
  bg.setAttribute('cx','50');bg.setAttribute('cy','50');bg.setAttribute('r',r);bg.classList.add('gauge-bg');
  bg.setAttribute('stroke-dasharray',`${C*0.75} ${C}`);bg.setAttribute('stroke-dashoffset',C*0.125);bg.setAttribute('transform','rotate(90 50 50)');
  const fg=document.createElementNS('http://www.w3.org/2000/svg','circle');
  fg.setAttribute('cx','50');fg.setAttribute('cy','50');fg.setAttribute('r',r);fg.classList.add('gauge-fg');
  fg.setAttribute('transform','rotate(90 50 50)');fg.dataset.live=tile.param;fg.dataset.r=r;fg.dataset.c=C;
  svg.append(bg,fg);
  const center=document.createElement('div');center.className='gauge-center';
  const lbl=document.createElement('div');lbl.className='tile-label';lbl.textContent=p.name;
  const val=document.createElement('div');val.className='tile-value';val.dataset.live=tile.param;val.textContent=liveValues[tile.param];
  const unit=document.createElement('div');unit.className='tile-unit';unit.textContent=p.unit;
  center.append(lbl,val);if(p.unit)center.append(unit);
  wrap.append(svg,center);updateGaugeFg(fg,p,liveValues[tile.param]);return wrap;
}
function updateGaugeFg(fg,p,v){
  if(v==='--'||isNaN(v))return;
  const r=parseFloat(fg.dataset.r),C=parseFloat(fg.dataset.c);
  fg.setAttribute('stroke-dasharray',`${C*0.75*Math.max(0,Math.min(1,(v-p.min)/(p.max-p.min)))} ${C}`);
  fg.setAttribute('stroke-dashoffset',C*0.125);
}
function updateDisplay(){
  document.querySelectorAll('[data-live]').forEach(el=>{
    const code=el.dataset.live,p=PARAMS[code];if(!p)return;
    const v=liveValues[code];
    if(el.tagName==='circle')updateGaugeFg(el,p,v);else el.textContent=v;
  });
  if(document.pictureInPictureElement)drawPip();
}
window.addEventListener('resize',()=>render());
window.addEventListener('orientationchange',()=>setTimeout(render,100));

/* ── DRAG ── */
function attachDrag(el,tile){
  let tapCount=0,tapTimer=null,tapStart=0,isDragging=false,dragStartX=0,dragStartY=0;
  el.addEventListener('pointerdown',e=>{
    if(e.target.closest('.remove-badge'))return;
    tapStart=Date.now();dragStartX=e.clientX;dragStartY=e.clientY;
    if(editMode&&dragSelected===tile.id){isDragging=true;el.setPointerCapture(e.pointerId);e.preventDefault();}
  });
  el.addEventListener('pointermove',e=>{
    if(!isDragging)return;e.preventDefault();
    const target=document.elementFromPoint(e.clientX,e.clientY)?.closest('.tile:not(.add-tile)');
    document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
    if(target&&target.dataset.id&&target.dataset.id!==tile.id){target.classList.add('drag-over');el._over=target.dataset.id;}
    else el._over=null;
  });
  el.addEventListener('pointerup',e=>{
    e.preventDefault();
    if(isDragging){
      isDragging=false;
      document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
      if(el._over){
        const fi=layout.findIndex(t=>t.id===tile.id),ti=layout.findIndex(t=>t.id===el._over);
        if(fi>=0&&ti>=0){const[m]=layout.splice(fi,1);layout.splice(ti,0,m);ls_set('aracer_layout',layout);}
        el._over=null;
      }
      dragSelected=null;render();return;
    }
    if(Date.now()-tapStart>500)return;
    tapCount++;
    if(tapCount===1){
      tapTimer=setTimeout(()=>{
        tapCount=0;
        if(editMode){
          if(dragSelected===tile.id){dragSelected=null;el.classList.remove('drag-selected');showHint('Скасовано');}
          else{document.querySelectorAll('.drag-selected').forEach(x=>x.classList.remove('drag-selected'));dragSelected=tile.id;el.classList.add('drag-selected');showHint('Тягни плитку');}
        }else openTileEdit(tile);
      },220);
    }else{
      clearTimeout(tapTimer);tapCount=0;
      if(!editMode){enterEditMode();setTimeout(()=>{dragSelected=tile.id;document.querySelector(`[data-id="${tile.id}"]`)?.classList.add('drag-selected');showHint('Тягни плитку');},50);}
      else openTileEdit(tile);
    }
  });
  el.addEventListener('pointercancel',()=>{isDragging=false;document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));dragSelected=null;render();});
}

function enterEditMode(){editMode=true;document.getElementById('editBtn').className='active';document.getElementById('editBtn').textContent='Готово';render();}
function exitEditMode(){editMode=false;dragSelected=null;document.getElementById('editBtn').className='';document.getElementById('editBtn').textContent='Налаштувати';editModal.classList.remove('show');render();}

/* ── EDIT MODAL ── */
let currentTab='main';
const editModal=document.getElementById('editModal');
document.getElementById('editBtn').addEventListener('click',()=>{
  if(editMode){exitEditMode();editModal.classList.remove('show');return;}
  enterEditMode();switchTab('main');editModal.classList.add('show');
});
document.getElementById('editModalClose').addEventListener('click',()=>{
  // close modal but keep edit mode active so tiles still jiggle and can be dragged
  editModal.classList.remove('show');
});
editModal.addEventListener('click',e=>{
  if(e.target===editModal){
    // tap outside sheet = close modal, keep edit mode
    editModal.classList.remove('show');
  }
});

function switchTab(tab){
  currentTab=tab;
  document.getElementById('tabMain').className='tab'+(tab==='main'?' active':'');
  document.getElementById('tabPip').className='tab'+(tab==='pip'?' active':'');
  if(tab==='main')buildMainEditBody();else buildPipEditBody();
}

function openTileEdit(tile){enterEditMode();switchTab('main');editModal.classList.add('show');openPicker(tile,'main');}

function buildMainEditBody(){
  const body=document.getElementById('editModalBody');body.innerHTML='';
  const gt=document.createElement('div');gt.className='group-title';gt.textContent='Плитки на екрані';body.appendChild(gt);
  layout.forEach(tile=>{
    const p=PARAMS[tile.param];
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:8px;padding:8px 6px;border-bottom:1px solid var(--line);';
    row.innerHTML=`<div style="width:8px;height:8px;border-radius:50%;background:${p.color};flex-shrink:0;"></div>
      <div style="flex:1;font-size:13px;font-weight:600;">${p.name}</div>
      <div style="font-size:11px;color:var(--muted);">${tile.size} ${tile.style}</div>`;
    const rm=document.createElement('button');
    rm.style.cssText='border:none;background:rgba(255,77,77,0.1);color:#ff8080;border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;';
    rm.textContent='✕';
    rm.addEventListener('click',()=>{layout=layout.filter(t=>t.id!==tile.id);ls_set('aracer_layout',layout);render();buildMainEditBody();});
    row.appendChild(rm);body.appendChild(row);
  });
  const addBtn=document.createElement('button');
  addBtn.className='action-btn primary';addBtn.style.marginTop='10px';addBtn.textContent='+ Додати плитку';
  addBtn.addEventListener('click',()=>openPicker(null,'main'));
  body.appendChild(addBtn);
}

/* ── PIP LAYOUT ── */
// pipLayout: array of {code, size: '1x1'|'2x1'}
let pipLayout=ls_get('aracer_pip_layout')||[
  {code:'RPM',   size:'2x1'},
  {code:'T_Eng', size:'1x1'},
  {code:'Volt',  size:'1x1'},
];
let pipCols=ls_get('aracer_pip_cols')||2;

function buildPipEditBody(){
  const body=document.getElementById('editModalBody');body.innerHTML='';

  // Start button at top - direct click
  const startBtn=document.createElement('button');
  startBtn.className='action-btn primary';
  startBtn.style.cssText='font-size:15px;font-weight:700;background:rgba(55,224,230,0.15);border-color:rgba(55,224,230,0.5);';
  startBtn.textContent='▶ Відкрити PiP';
  startBtn.addEventListener('click',function(){editModal.classList.remove('show');startPip();});
  body.appendChild(startBtn);

  const gt=document.createElement('div');gt.className='group-title';gt.textContent='Параметри PiP (до 6)';body.appendChild(gt);

  pipLayout.forEach((item,i)=>{
    const p=PARAMS[item.code];
    const row=document.createElement('div');row.className='pip-item-row';
    row.innerHTML=`<div class="pip-item-color" style="background:${p.color}"></div>
      <div class="pip-item-name">${p.name}</div>
      <div class="pip-item-size">${i%2===0?'ліва':'права'}</div>`;
    const rm=document.createElement('button');rm.className='pip-rm-btn';rm.textContent='✕';
    rm.addEventListener('click',()=>{pipLayout.splice(i,1);ls_set('aracer_pip_layout',pipLayout);buildPipEditBody();});
    row.appendChild(rm);
    body.appendChild(row);
  });

  if(pipLayout.length<6){
    const addBtn=document.createElement('button');
    addBtn.className='action-btn primary';addBtn.style.marginTop='8px';addBtn.textContent='+ Додати параметр';
    addBtn.addEventListener('click',()=>openPicker(null,'pip'));
    body.appendChild(addBtn);
  }

  // Column selector
  const gt2=document.createElement('div');gt2.className='group-title';gt2.textContent='Кількість колонок';body.appendChild(gt2);
  const colRow=document.createElement('div');colRow.className='style-row';
  [1,2,3].forEach(n=>{
    const b=document.createElement('div');
    b.className='style-btn'+(pipCols===n?' selected':'');
    b.textContent=n+(n===1?' кол.':(n===2?' кол.':' кол.'));
    b.addEventListener('click',()=>{pipCols=n;ls_set('aracer_pip_cols',n);buildPipEditBody();});
    colRow.appendChild(b);
  });
  body.appendChild(colRow);
}

/* ── PARAM PICKER ── */
const pickerModal=document.getElementById('pickerModal');
let pickerTarget=null,pickerMode='main';
function openPicker(tile,mode){
  pickerTarget=tile;pickerMode=mode||'main';
  document.getElementById('pickerTitle').textContent=mode==='pip'?'Додати в PiP':tile?'Змінити плитку':'Додати плитку';
  buildPickerBody();pickerModal.classList.add('show');
}
function closePicker(){pickerModal.classList.remove('show');pickerTarget=null;}
document.getElementById('pickerClose').addEventListener('click',closePicker);
pickerModal.addEventListener('click',e=>{if(e.target===pickerModal)closePicker();});

function buildPickerBody(){
  const body=document.getElementById('pickerBody');body.innerHTML='';
  const cur=pickerTarget?.param;const shown=new Set();
  PARAM_GROUPS.forEach(g=>{
    const gt=document.createElement('div');gt.className='group-title';gt.textContent=g.title;body.appendChild(gt);
    const list=document.createElement('div');list.className='param-list';
    g.codes.forEach(code=>{
      if(shown.has(code))return;shown.add(code);
      const p=PARAMS[code];
      const item=document.createElement('div');
      item.className='param-item'+(code===cur?' selected':'');
      item.innerHTML=`<div><span class="pname">${p.name}</span><span class="pcode">${p.unit}</span></div><div class="check">✓</div>`;
      item.addEventListener('click',()=>{
        if(pickerMode==='pip'){
          pipLayout.push({code,size:'1x1'});
          ls_set('aracer_pip_layout',pipLayout);
          closePicker();buildPipEditBody();
        }else selectParam(code);
      });
      list.appendChild(item);
    });
    body.appendChild(list);
  });
  if(pickerMode==='main'){
    const st=document.createElement('div');st.className='group-title';st.textContent='Стиль';body.appendChild(st);
    const sr=document.createElement('div');sr.className='style-row';
    [['flat','Цифри'],['gauge','Кільце']].forEach(([v,l])=>{
      const b=document.createElement('div');b.className='style-btn'+((pickerTarget?.style||'flat')===v?' selected':'');
      b.textContent=l;b.addEventListener('click',()=>selectStyle(v));sr.appendChild(b);
    });body.appendChild(sr);
    const szt=document.createElement('div');szt.className='group-title';szt.textContent='Розмір';body.appendChild(szt);
    const szr=document.createElement('div');szr.className='size-row';
    [['1x1','1×1'],['2x1','2×1'],['2x2','2×2']].forEach(([v,l])=>{
      const b=document.createElement('div');b.className='style-btn'+((pickerTarget?.size||'1x1')===v?' selected':'');
      b.textContent=l;b.addEventListener('click',()=>selectSize(v));szr.appendChild(b);
    });body.appendChild(szr);
    if(pickerTarget){
      const db=document.createElement('button');db.className='action-btn danger';db.textContent='🗑 Видалити';
      db.addEventListener('click',()=>{layout=layout.filter(t=>t.id!==pickerTarget.id);ls_set('aracer_layout',layout);closePicker();render();buildMainEditBody();});
      body.appendChild(db);
    }
  }
}
function selectParam(code){
  if(pickerTarget)pickerTarget.param=code;
  else{pickerTarget={id:'t'+(nextId++),param:code,style:'flat',size:'1x1'};layout.push(pickerTarget);}
  ls_set('aracer_layout',layout);buildPickerBody();render();buildMainEditBody();
}
function selectStyle(v){if(pickerTarget){pickerTarget.style=v;ls_set('aracer_layout',layout);buildPickerBody();render();}}
function selectSize(v){if(pickerTarget){pickerTarget.size=v;ls_set('aracer_layout',layout);buildPickerBody();render();}}

function showHint(msg){const t=document.getElementById('hintToast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

/* ── PIP ── */
const pipCanvas=document.getElementById('pipCanvas');
const pipVideo=document.getElementById('pipVideo');
const ctx=pipCanvas.getContext('2d');
let pipInterval=null;

function drawPip(){
  const W=pipCanvas.width,H=pipCanvas.height;
  ctx.fillStyle='#0a0a0c';ctx.fillRect(0,0,W,H);
  if(!pipLayout.length)return;

  const n=pipLayout.length;
  const cols=pipCols===1?1:pipCols===3?3:2; // 1, 2, or 3 columns

  if(cols===1){
    // Single column — all stacked vertically
    const cellH=H/n;
    pipLayout.forEach((item,i)=>{
      if(i>0) drawDivider(0,i*cellH,W,i*cellH);
      drawPipCell(item,0,i*cellH,W,cellH,n===1);
    });
  } else if(cols===2){
    // 2 columns: left wider (60%), right narrower (40%)
    const leftW=W*0.60;
    const rightW=W-leftW-1;
    const leftItems=pipLayout.filter((_,i)=>i%2===0);
    const rightItems=pipLayout.filter((_,i)=>i%2===1);
    const leftH=H/leftItems.length;
    leftItems.forEach((item,i)=>{
      if(i>0) drawDivider(0,i*leftH,leftW,i*leftH);
      drawPipCell(item,0,i*leftH,leftW,leftH,leftItems.length===1&&!rightItems.length);
    });
    drawDivider(leftW,0,leftW,H);
    if(rightItems.length){
      const rightH=H/rightItems.length;
      rightItems.forEach((item,i)=>{
        if(i>0) drawDivider(leftW+1,i*rightH,W,i*rightH);
        drawPipCell(item,leftW+2,i*rightH,rightW,rightH,false);
      });
    }
  } else {
    // 3 columns — equal width
    const cellW=W/3;
    const rows=Math.ceil(n/3);
    const cellH=H/rows;
    pipLayout.forEach((item,i)=>{
      const col=i%3, row=Math.floor(i/3);
      if(col>0) drawDivider(col*cellW,row*cellH,col*cellW,(row+1)*cellH);
      if(row>0&&col===0) drawDivider(0,row*cellH,W,row*cellH);
      drawPipCell(item,col*cellW+1,row*cellH+1,cellW-2,cellH-2,n===1);
    });
  }
}

function drawDivider(x1,y1,x2,y2){
  ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
}

function drawPipCell(item,x,y,w,h,isBig){
  const code=item.code||item; // support both {code,size} and plain string
  const p=PARAMS[code];
  const val=String(liveValues[code]);
  const pad=6;

  // bg
  ctx.fillStyle='rgba(255,255,255,0.02)';
  ctx.beginPath();if(ctx.roundRect)ctx.roundRect(x+2,y+2,w-4,h-4,6);else ctx.rect(x+2,y+2,w-4,h-4);
  ctx.fill();

  // name
  const nameFontSize=Math.max(10,Math.min(14,w/8));
  ctx.fillStyle=p.color;ctx.font=`700 ${nameFontSize}px sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(p.name.toUpperCase(),x+w/2,y+pad);

  // underline
  ctx.fillStyle=p.color;ctx.fillRect(x+w*0.3,y+nameFontSize+pad+3,w*0.4,1);

  // value
  const maxValH=h*0.55;
  const valFontSize=isBig?Math.min(80,maxValH):Math.min(40,maxValH);
  ctx.fillStyle='#ffffff';ctx.font=`700 ${valFontSize}px monospace`;
  ctx.textBaseline='middle';
  ctx.fillText(val,x+w/2,y+h*0.65);
}

async function startPip(){
  if(!('requestPictureInPicture' in document.createElement('video'))){showHint('PiP не підтримується');return;}
  drawPip();
  pipVideo.srcObject=pipCanvas.captureStream(10);
  if(pipInterval)clearInterval(pipInterval);
  pipInterval=setInterval(drawPip,500);
  try{
    await pipVideo.play();
    if(document.pictureInPictureElement)await document.exitPictureInPicture();
    else await pipVideo.requestPictureInPicture();
  }catch(e){showHint('PiP: '+e.message);if(pipInterval){clearInterval(pipInterval);pipInterval=null;}}
}
pipVideo.addEventListener('leavepictureinpicture',()=>{if(pipInterval){clearInterval(pipInterval);pipInterval=null;}});

// Direct click - no delay
document.getElementById('pipBtn').addEventListener('click',function(){startPip();});

render();
</script>
